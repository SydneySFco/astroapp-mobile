name: Nightly Concurrency Harness

on:
  workflow_dispatch:
    inputs:
      workers:
        description: "Parallel worker count"
        required: false
        default: "20"
      iterations:
        description: "Race iterations"
        required: false
        default: "5"
      stale_ratio_fail_threshold:
        description: "Fail threshold for stale_conflict_ratio"
        required: false
        default: "0.3000"
      reliability_warn_threshold:
        description: "Warn threshold for macro ECE"
        required: false
        default: "0.0800"
      reliability_fail_threshold:
        description: "Fail threshold for macro ECE"
        required: false
        default: "0.1200"
  schedule:
    - cron: "30 2 * * *" # 02:30 UTC nightly

jobs:
  concurrency-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run DB concurrency harness (strict assertions)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WORKERS: ${{ github.event.inputs.workers || '20' }}
          ITERATIONS: ${{ github.event.inputs.iterations || '5' }}
          STALE_RATIO_FAIL_THRESHOLD: ${{ github.event.inputs.stale_ratio_fail_threshold || '0.3000' }}
          FAIL_ON_APPLIED_ZERO: "1"
          FAIL_ON_THRESHOLD_BREACH: "1"
          HARNESS_MODE: auto
        run: |
          chmod +x scripts/concurrency-harness-rloop029.sh
          scripts/concurrency-harness-rloop029.sh

      - name: Evaluate reliability + build ground-truth artifact + enforce gate
        env:
          RELIABILITY_WARN_THRESHOLD: ${{ github.event.inputs.reliability_warn_threshold || '0.0800' }}
          RELIABILITY_FAIL_THRESHOLD: ${{ github.event.inputs.reliability_fail_threshold || '0.1200' }}
        run: |
          python3 scripts/eval-reliability-rloop036.py \
            --input reports/incidents-groundtruth.sample.jsonl \
            --bins 10 \
            --time-field timestamp \
            --slice-by day \
            --out reports/reliability-eval-rloop036.json

          today="$(date -u +%Y-%m-%d)"

          python3 scripts/build-groundtruth-artifact-rloop039.py \
            --source-type jsonl \
            --source-uri reports/incidents-groundtruth.sample.jsonl \
            --watermark-field timestamp \
            --watermark-state reports/groundtruth-watermarks/nightly.json \
            --cadence nightly \
            --snapshot-date "$today" \
            --global-min-samples 25 \
            --min-class-samples "unknown:30" \
            --out "reports/groundtruth-artifacts/nightly/$today/groundtruth-snapshot.json"

          python3 scripts/validate-groundtruth-artifact-schema-rloop039.py \
            --input "reports/groundtruth-artifacts/nightly/$today/groundtruth-snapshot.json"

          if [ "$(date -u +%u)" = "7" ]; then
            python3 scripts/build-groundtruth-artifact-rloop039.py \
              --source-type jsonl \
              --source-uri reports/incidents-groundtruth.sample.jsonl \
              --watermark-field timestamp \
              --watermark-state reports/groundtruth-watermarks/weekly.json \
              --cadence weekly \
              --snapshot-date "$today" \
              --global-min-samples 25 \
              --min-class-samples "unknown:30" \
              --out "reports/groundtruth-artifacts/weekly/$today/groundtruth-snapshot.json"

            python3 scripts/validate-groundtruth-artifact-schema-rloop039.py \
              --input "reports/groundtruth-artifacts/weekly/$today/groundtruth-snapshot.json"
          fi

          python3 scripts/reliability-gate-rloop037.py \
            --input reports/reliability-eval-rloop036.json \
            --warn-threshold "$RELIABILITY_WARN_THRESHOLD" \
            --fail-threshold "$RELIABILITY_FAIL_THRESHOLD" \
            --out-json reports/reliability-gate-rloop037.json \
            --out-md reports/reliability-gate-rloop037.md

          python3 scripts/route-drift-alerts-rloop039.py \
            --input reports/reliability-eval-rloop036.json \
            --window 7 \
            --warn-delta 0.015 \
            --critical-delta 0.030 \
            --warn-abs "$RELIABILITY_WARN_THRESHOLD" \
            --critical-abs "$RELIABILITY_FAIL_THRESHOLD" \
            --suppression-window-minutes 60 \
            --out-json reports/drift-alert-routing-rloop039.json \
            --out-slack reports/drift-alert-routing-rloop039.slack.json \
            --out-webhook reports/drift-alert-routing-rloop039.webhook.json

      - name: Upload harness report + history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: concurrency-harness-report
          path: |
            reports/concurrency-harness-*.json
            reports/concurrency-harness-history.ndjson
            reports/reliability-eval-rloop036.json
            reports/reliability-gate-rloop037.json
            reports/reliability-gate-rloop037.md
            reports/drift-alert-routing-rloop039.json
            reports/drift-alert-routing-rloop039.slack.json
            reports/drift-alert-routing-rloop039.webhook.json
            reports/drift-alert-state-rloop039.json
            reports/groundtruth-watermarks/*.json
            reports/groundtruth-artifacts/**/*.json

      - name: Notify webhook (optional)
        if: always() && secrets.CONCURRENCY_HARNESS_WEBHOOK_URL != ''
        env:
          CONCURRENCY_HARNESS_WEBHOOK_URL: ${{ secrets.CONCURRENCY_HARNESS_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          latest_report="$(ls -1t reports/concurrency-harness-*.json 2>/dev/null | head -n 1)"
          if [ -z "$latest_report" ]; then
            payload='{"text":"[concurrency-harness] no report generated","run_url":"'"$GITHUB_RUN_URL"'"}'
          else
            payload="$(python3 - <<'PY' "$latest_report" "$GITHUB_RUN_URL"
import json,sys
report_path,run_url=sys.argv[1],sys.argv[2]
with open(report_path,'r',encoding='utf-8') as f:
    r=json.load(f)
outcomes=r.get('outcomes',{})
ratios=r.get('ratios',{})
assertions=r.get('assertions',{})
conf=r.get('contention_confidence',{})
dom=conf.get('dominant_contention_class')
dom_score=conf.get('dominant_confidence_score')
top_fp=(conf.get('top_blocker_fingerprint') or {}).get('query_fingerprint_hash')
if isinstance(top_fp,str) and len(top_fp) > 12:
    top_fp=f"{top_fp[:12]}…"
text=(
    f"[concurrency-harness] status={assertions.get('job_status')} "
    f"applied={outcomes.get('applied')} idempotent={outcomes.get('idempotent')} "
    f"stale={outcomes.get('stale_blocked')} unknown={outcomes.get('unknown')} "
    f"stale_ratio={ratios.get('stale_conflict_ratio')} "
    f"dominant={dom}@{dom_score} top_blocker_fp={top_fp}"
)
print(json.dumps({'text': text, 'run_url': run_url}))
PY
)"
          fi

          curl -sS -X POST "$CONCURRENCY_HARNESS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload" >/dev/null

      - name: Secret requirements
        if: always()
        run: |
          echo "Required secrets for rpc_http mode: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY"
          echo "Optional secret for notifications: CONCURRENCY_HARNESS_WEBHOOK_URL"